---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: service-payment
  namespace: app
  labels:
    app: service-payment
    version: v1
spec:
  replicas: 1
  selector:
    matchLabels:
      app: service-payment
  template:
    metadata:
      labels:
        app: service-payment
        version: v1
    spec:
      serviceAccountName: service-payment-sa
      containers:
      - name: service-payment
        image: service-payment:1.0
        imagePullPolicy: Never
        ports:
        - containerPort: 8080
        livenessProbe:
          httpGet:
            path: /health
            port: 8080
          initialDelaySeconds: 10
          periodSeconds: 30
        readinessProbe:
          httpGet:
            path: /health
            port: 8080
          initialDelaySeconds: 5
          periodSeconds: 10
        resources:
          requests:
            memory: "64Mi"
            cpu: "100m"
          limits:
            memory: "256Mi"
            cpu: "500m"
---
apiVersion: v1
kind: Service
metadata:
  name: service-payment
  namespace: app
spec:
  selector:
    app: service-payment
  ports:
  - name: http
    port: 8080
    targetPort: 8080
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: service-payment-sa
  namespace: app
